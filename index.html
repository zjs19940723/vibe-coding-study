<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="timer-app">
            <h1>番茄钟</h1>

            <div class="timer-display">
                <div class="time-circle">
                    <div class="time-text">
                        <span id="minutes">25</span>
                        <span class="separator">:</span>
                        <span id="seconds">00</span>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button id="startBtn" class="btn btn-start">开始</button>
                <button id="pauseBtn" class="btn btn-pause" disabled>暂停</button>
                <button id="resetBtn" class="btn btn-reset">重置</button>
            </div>

            <div class="status">
                <span id="status">准备就绪</span>
            </div>
        </div>
    </div>

    <audio id="notificationSound"></audio>
    <script src="script.js"></script>
</body>
</html>
